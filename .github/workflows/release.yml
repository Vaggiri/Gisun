name: Release GisunOS Executable

on:
  push:
    tags:
      - 'v*' # Triggers the build when you push a version tag like v1.0.0
  workflow_dispatch: # Allows manual execution from the Actions tab on GitHub

permissions:
  contents: write # Grants write permissions to publish the release and upload assets

jobs:
  build-and-release:
    name: Build & Release Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Client Dependencies and Build Assets
        run: |
          cd client
          npm ci
          npm run build
          cd ..

      - name: Install Root Dependencies
        run: npm ci

      - name: Build and Package Desktop App
        run: npm run package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist-desktop/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
